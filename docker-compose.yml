version: "3.9"

services:
  workspace:
    build:
      context: .
      dockerfile: docker/workspace/Dockerfile
    container_name: saas_workspace
    working_dir: /var/www/html/app
    tty: true
    stdin_open: true
    volumes:
      - ./src:/var/www/html
    ports:
      - "5173:5173"
    depends_on:
      - db
      - redis
    networks:
      - saas_network

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: saas_app
    restart: unless-stopped
    working_dir: /var/www/html/app
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
      - redis
    networks:
      - saas_network

  web:
    image: nginx:1.27-alpine
    container_name: saas_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - saas_network

  db:
    image: postgres:16-alpine
    container_name: saas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas_testing
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - saas_db_data:/var/lib/postgresql/data
    networks:
      - saas_network

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - saas_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: saas_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - saas_network

volumes:
  saas_db_data:

networks:
  saas_network:
    driver: bridge